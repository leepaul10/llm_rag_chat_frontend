<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>ChatLLM Bot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        * { box-sizing: border-box; margin:0; padding:0; }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: #4a4f53; 
            height: 100dvh; 
            width: 100vw;
            display: flex;
            justify-content: center;
            /* Remove 'align-items: center' to prevent the container from jumping up */
            align-items: flex-start; 
            overflow: hidden;
        }

        .container {
            background: #201e1e;
            width: 100%;
            /* This ensures the container always fills the available height */
            height: 100%; 
            display: flex;
            flex-direction: column;
            position: relative;
        }

        @media (min-width: 768px) {
            .container {
                max-width: 600px;
                height: 90dvh;
                margin-top: 5dvh;
                border-radius: 12px;
            }
        }

        .chat-header {
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid #ff4000;
            background: #292a2b;
            flex-shrink: 0; /* Header size never changes */
        }

        .chatbox {
            flex-grow: 1;
            padding: 15px;
            overflow-y: auto;
            background: #343434;
            display: flex;
            flex-direction: column;
            gap: 10px;
            /* This allows the chatbox to shrink when the keyboard pushes the input up */
            min-height: 0; 
        }

        .input-area {
            display: flex;
            align-items: center;
            padding: 10px;
            background: #212121;
            border-top: 1px solid #b03921;
            flex-shrink: 0; /* Input area size never changes */
            padding-bottom: max(10px, env(safe-area-inset-bottom));
        }

        /* Essential Mobile Tweaks */
        input[type="text"] {
            flex-grow: 1;
            padding: 12px 15px;
            border: none;
            border-radius: 25px;
            font-size: 16px; /* Stops iOS from zooming the whole screen */
            background: #353535;
            color: #fff;
            outline: none;
        }

        /* Header Animation/Logo */
        .bot-info { display: flex; align-items: center; gap: 12px; color: white; }
        .bot-header-logo { width: 32px; height: 32px; border-radius: 50%; animation: spin 4.5s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Bubbles */
        .message { display: flex; max-width: 85%; margin-bottom: 10px; }
        .message.bot { align-self: flex-start; }
        .message.user { align-self: flex-end; }
        .text-bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; background: #f2f2f2; color: #191a1c; }
        .message.user .text-bubble { background: #a7efaf; }
    </style>
</head>
<body>
    <div class="container">
        <header class="chat-header">
            <div class="bot-info">
                <img src="LLMlogo.jpeg" alt="Logo" class="bot-header-logo">
                <h3>ChatLLM</h3>
            </div>
        </header>

        <div class="chatbox">
            <div class="message bot">
                <div class="text-bubble">The header is now locked at the top. Only this chat area will shrink when you type!</div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" placeholder="Type a message..." />
            <button style="background:none; border:none; color:#ff5e00; padding:10px;">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>
</body>
</html>
