<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>ChatLLM Bot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font Awesome -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
        * { box-sizing: border-box; margin:0; padding:0; }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: #4a4f53; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh; /* ✅ stable height */
            color: #9d9d9d;
        }

        .container {
            background: #201e1e;
            width: 100%;
            max-width: 600px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        .chat-header {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #ff4000;
            background: #292a2b;
            flex-shrink: 0;
        }

        .bot-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .bot-info h3 {
            font-size: 18px;
            color: #fff;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .bot-header-logo {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            animation: spin 4.5s linear infinite;
        }

        .chatbox {
            flex-grow: 1;
            min-height: 0; /* ✅ critical fix */
            padding: 15px;
            padding-bottom: 80px; /* ✅ space for fixed input */
            overflow-y: auto;
            background: #343434;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            display: flex;
            max-width: 85%;
        }

        .message.user { align-self: flex-end; }
        .message.bot { align-self: flex-start; }

        .text-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.6;
            word-break: break-word;
        }

        .message.user .text-bubble {
            background: #a7efaf;
            color: #0b0c0d;
            border-bottom-right-radius: 4px;
        }

        .message.bot .text-bubble {
            background: #f2f2f2;
            color: #191a1c;
            border-bottom-left-radius: 4px;
        }

        /* ✅ FIXED INPUT AREA */
        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            max-width: 600px;
            margin: auto;
            right: 0;
            display: flex;
            align-items: center;
            padding: 10px;
            background: #212121;
            border-top: 1px solid #b03921;
            z-index: 1000;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            background: #353535;
            color: #d7d7d7;
            outline: none;
        }

        input::placeholder { color: #b5b2b2; }

        button {
            background: transparent;
            color: #ff5e00;
            border: none;
            padding: 8px;
            font-size: 18px;
            cursor: pointer;
        }

        /* Mobile full screen */
        @media (max-width: 480px) {
            body {
                align-items: stretch;
            }

            .container {
                max-width: 100%;
                border-radius: 0;
            }

            .input-area {
                max-width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header class="chat-header">
            <div class="bot-info">
                <img src="LLMlogopng.png" class="bot-header-logo">
                <h3>ChatLLM</h3>
            </div>
        </header>

        <div id="chatbox" class="chatbox"></div>

        <div class="input-area">
            <input id="inputMessage" type="text" placeholder="Type a message..." />
            <button id="sendBtn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        const chatbox = document.getElementById("chatbox");
        const input = document.getElementById("inputMessage");
        const sendBtn = document.getElementById("sendBtn");

        function addMessage(text, sender) {
            const msg = document.createElement("div");
            msg.classList.add("message", sender);

            const bubble = document.createElement("div");
            bubble.classList.add("text-bubble");
            bubble.innerText = text;

            msg.appendChild(bubble);
            chatbox.appendChild(msg);

            chatbox.scrollTop = chatbox.scrollHeight;
        }

        function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, "user");
            input.value = "";

        }

        sendBtn.addEventListener("click", sendMessage);

        input.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });

        /* ✅ Prevent chat jump on mobile */
        input.addEventListener("focus", () => {
            setTimeout(() => {
                chatbox.scrollTop = chatbox.scrollHeight;
            }, 300);
        });

        
    </script>
</body>
</html>
